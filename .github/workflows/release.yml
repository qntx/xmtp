name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: qntx/workflows/.github/workflows/release-rust.yml@main
    with:
      bin: xmtp
      package: xmtp-cli
      cross-packages: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64"
      cross-env: "PKG_CONFIG_ALLOW_CROSS=1"
      cargo-env: "CARGO_PROFILE_RELEASE_LTO=off"
